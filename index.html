<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skylix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Welcome to Skylix 🌟</h1>
  <p>Your live weather, cameras, and radar will appear here!</p>

  <!-- Example Camera Embed -->
  <h2>Live Camera</h2>
  <iframe src="https://www.earthcam.com/preview/venicebeach/?cam=venicebeach" width="600" height="400" frameborder="0"></iframe>

  <!-- Example Radar Embed -->
  <h2>Live Radar</h2>
  <iframe src="https://embed.windy.com/embed2.html?lat=41.3&lon=69.2&zoom=5&level=surface&overlay=radar" width="650" height="450" frameborder="0"></iframe>

  <script src="app.js"></script>
</body>
</html>
